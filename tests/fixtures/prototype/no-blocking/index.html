<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Forkful — Checkout (throwaway prototype, no forced gaps)</title>
<!-- Self-contained & static: no network, no backend, synthetic mock data only.
     No blocking gap was targeted, so there are no provisional banners. -->
<style>
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; color: #1f2329; background: #f6f7f9; }
  main { max-width: 720px; margin: 0 auto; padding: 20px 16px; }
  .screen { display: none; }
  .screen.active { display: block; }
  .btn { background: #e8552a; color: #fff; border: 0; border-radius: 8px; padding: 12px 16px; cursor: pointer; }
</style>
</head>
<body>
<main>
  <section class="screen active" data-screen="cart" id="screen-cart">
    <h1>Your cart</h1>
    <p>2× Margherita slice — $11.00</p>
    <button class="btn" onclick="go('checkout')">Checkout</button>
  </section>
  <section class="screen" data-screen="checkout" id="screen-checkout">
    <h1>Delivery details</h1>
    <p>Synthetic demo — no forced decisions in this build.</p>
    <button class="btn" onclick="go('cart')">Back</button>
  </section>
</main>
<script>
  function go(id) {
    document.querySelectorAll('.screen').forEach(function (s) {
      s.classList.toggle('active', s.getAttribute('data-screen') === id);
    });
  }
  go('cart');
</script>
</body>
</html>
