name: PRD Merge Gate

# Blocks merging a PR that touches prd/ or spec/ while any blocking gap
# in analysis/gaps.json is still open.
#
# Engagement repos: point the --gaps-path arg at their own analysis/gaps.json.
# This file uses examples/sample-engagement/analysis/gaps.json so the gate is
# self-testable within the platform repo without setting up a separate repo.

on:
  pull_request:
    paths:
      - "prd/**"
      - "spec/**"
      # Also gate on changes to the sample engagement's prd/spec dirs
      - "examples/sample-engagement/prd/**"
      - "examples/sample-engagement/spec/**"

jobs:
  blocker-check:
    name: Check for open blocking gaps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Run the check script against the sample engagement's gap data. Fails on
      # open blocking gaps OR graph-integrity violations (dangling claim edges,
      # dangling PRD/SPEC citations, duplicate ids, missing resolution records).
      # In an engagement repo, change the path to: analysis/gaps.json
      - name: Run blocker + graph-integrity check
        run: |
          node --experimental-strip-types src/ci/check-blockers.ts \
            examples/sample-engagement/analysis/gaps.json
